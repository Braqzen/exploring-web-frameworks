# Shared configuration for services
x-common: &common-setup
  deploy:
    resources:
      limits:
        memory: 64M
  memswap_limit: 64M
  restart: unless-stopped

services:
  # A service that sends payloads to various api services.
  generator:
    <<: *common-setup
    deploy:
      resources:
        limits:
          memory: 128M
    memswap_limit: 128M
    image: servers-generator:latest
    command: ["/app/generator"]
    environment:
      RUST_LOG: info
      OTEL_EXPORTER_OTLP_ENDPOINT: http://alloy:4318
      OTEL_METRIC_EXPORT_INTERVAL: "10000"
      PYROSCOPE_URL: http://alloy:9999
    depends_on:
      - alloy

  # Rust API service that uses axum.
  axum:
    <<: *common-setup
    deploy:
      resources:
        limits:
          memory: 128M
    memswap_limit: 128M
    image: servers-axum:latest
    command: ["/app/axum"]
    environment:
      RUST_LOG: info
      SOCKET: 0.0.0.0:8000
      OTEL_EXPORTER_OTLP_ENDPOINT: http://alloy:4318
      OTEL_METRIC_EXPORT_INTERVAL: "10000"
      PYROSCOPE_URL: http://alloy:9999

  actix:
    <<: *common-setup
    deploy:
      resources:
        limits:
          memory: 128M
    memswap_limit: 128M
    image: servers-actix:latest
    command: ["/app/actix"]
    environment:
      RUST_LOG: info
      SOCKET: 0.0.0.0:8000
      OTEL_EXPORTER_OTLP_ENDPOINT: http://alloy:4318
      OTEL_METRIC_EXPORT_INTERVAL: "10000"
      PYROSCOPE_URL: http://alloy:9999

  warp:
    <<: *common-setup
    deploy:
      resources:
        limits:
          memory: 128M
    memswap_limit: 128M
    image: servers-warp:latest
    command: ["/app/warp"]
    environment:
      RUST_LOG: info
      SOCKET: 0.0.0.0:8000
      OTEL_EXPORTER_OTLP_ENDPOINT: http://alloy:4318
      OTEL_METRIC_EXPORT_INTERVAL: "10000"
      PYROSCOPE_URL: http://alloy:9999

  rocket:
    <<: *common-setup
    deploy:
      resources:
        limits:
          memory: 128M
    memswap_limit: 128M
    image: servers-rocket:latest
    command: ["/app/rocket"]
    environment:
      RUST_LOG: info
      SOCKET: 0.0.0.0:8000
      OTEL_EXPORTER_OTLP_ENDPOINT: http://alloy:4318
      OTEL_METRIC_EXPORT_INTERVAL: "10000"
      PYROSCOPE_URL: http://alloy:9999
      ROCKET_CLI_COLORS: "false"

  poem:
    <<: *common-setup
    deploy:
      resources:
        limits:
          memory: 128M
    memswap_limit: 128M
    image: servers-poem:latest
    command: ["/app/poem"]
    environment:
      RUST_LOG: info
      SOCKET: 0.0.0.0:8000
      OTEL_EXPORTER_OTLP_ENDPOINT: http://alloy:4318
      OTEL_METRIC_EXPORT_INTERVAL: "10000"
      PYROSCOPE_URL: http://alloy:9999

  grafana:
    image: grafana/grafana:11.6
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES: "false"
      GF_ANALYTICS_FEEDBACK_LINKS_ENABLED: "false"
      GF_PLUGINS_PUBLIC_KEY_RETRIEVAL_DISABLED: "true"
      GF_PLUGINS_PREINSTALL_DISABLED: "true"
      GF_NEWS_NEWS_FEED_ENABLED: "false"
    volumes:
      - ./telemetry/grafana/provisioning:/etc/grafana/provisioning
      - grafana-data-volume:/var/lib/grafana
    depends_on:
      - loki
      - pyroscope
      - prometheus
      - tempo
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.5.4
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-remote-write-receiver
    volumes:
      - ./telemetry/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data-volume:/prometheus
    restart: unless-stopped

  loki:
    image: grafana/loki:3.7
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/loki.yaml
    volumes:
      - ./telemetry/loki/loki.yaml:/etc/loki/loki.yaml
      - loki-data-volume:/loki
    restart: unless-stopped

  pyroscope:
    image: grafana/pyroscope:2.0.4
    ports:
      - "4040:4040"
    command: -config.file=/etc/pyroscope/pyroscope.yaml
    volumes:
      - ./telemetry/pyroscope/pyroscope.yaml:/etc/pyroscope/pyroscope.yaml
      - pyroscope-data-volume:/data
    restart: unless-stopped

  tempo:
    image: grafana/tempo:3.0.2
    ports:
      - "3200:3200"
    command: -config.file=/etc/tempo/tempo.yaml
    volumes:
      - ./telemetry/tempo/tempo.yaml:/etc/tempo/tempo.yaml
      - tempo-data-volume:/var/tempo
    restart: unless-stopped

  alloy:
    image: grafana/alloy:v1.17.0
    volumes:
      - ./telemetry/grafana/alloy:/etc/alloy
      - alloy-data-volume:/var/lib/alloy/data
    command: run --disable-reporting /etc/alloy/config.alloy
    depends_on:
      - loki
      - tempo
      - pyroscope
      - prometheus
    restart: unless-stopped

volumes:
  grafana-data-volume:
  loki-data-volume:
  prometheus-data-volume:
  pyroscope-data-volume:
  tempo-data-volume:
  alloy-data-volume:
