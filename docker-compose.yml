# Shared configuration for services
x-common: &common-setup
  deploy:
    resources:
      limits:
        memory: 64M
  memswap_limit: 64M
  restart: unless-stopped

services:
  # A service that sends payloads to various api services.
  generator:
    <<: *common-setup
    image: servers-generator:latest
    command: ["/app/generator"]
    environment:
      RUST_LOG: info
      SERVER_URL: http://axum:8000
      OTEL_EXPORTER_OTLP_ENDPOINT: http://alloy:4318
    depends_on:
      - alloy

  # Rust API service that uses axum.
  axum:
    <<: *common-setup
    image: servers-axum:latest
    command: ["/app/axum"]
    ports:
      - "8000:8000"
    environment:
      RUST_LOG: info
      SOCKET: 0.0.0.0:8000

  website:
    <<: *common-setup
    image: servers-ui:latest
    ports:
      - "8080:80"

  grafana:
    image: grafana/grafana:11.0.0
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana-data-volume:/var/lib/grafana
    depends_on:
      - loki
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.5.4
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-remote-write-receiver
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data-volume:/prometheus
    depends_on:
      - alloy
    restart: unless-stopped

  loki:
    image: grafana/loki:3.0.0
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki-data-volume:/loki
    restart: unless-stopped

  alloy:
    image: grafana/alloy:v1.17.0
    volumes:
      - ./grafana/alloy:/etc/alloy
      - alloy-data-volume:/var/lib/alloy/data
    command: run /etc/alloy/config.alloy
    depends_on:
      - loki
    restart: unless-stopped

volumes:
  grafana-data-volume:
  loki-data-volume:
  prometheus-data-volume:
  alloy-data-volume:
